name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue the newest without cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Stamp a unique service-worker version so the app detects each release
      # and offers the in-app "Update" prompt.
      - name: Version the service worker
        run: |
          sed -i "s#const VERSION = '.*';#const VERSION = '${GITHUB_SHA::7}';#" web/sw.js
          grep "const VERSION" web/sw.js

      # enablement: true creates the Pages site on first run, so no manual
      # "Settings -> Pages" step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish web/ as the site root, so start_url "./" resolves cleanly.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
