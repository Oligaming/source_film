<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#060818">
    <title>My Movies/Series</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div class="stats">
        <div class="stat-box">
            <div class="stat-box-content">
                <h2>Total Movies</h2>
                <p id="total-movies">0</p>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed"><path d="M480-528 296-344l-56-56 240-240 240 240-56 56-184-184Z"/></svg>
            </div>
            <div class="hidden-content" id="movies-detail"></div>
        </div>
        <div class="stat-box">
            <div class="stat-box-content">
                <h2>Total Series</h2>
                <p id="total-series">0</p>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed"><path d="M480-528 296-344l-56-56 240-240 240 240-56 56-184-184Z"/></svg>
            </div>
            <div class="hidden-content" id="series-detail"></div>
        </div>
        <div class="stat-box">
            <div class="stat-box-content">
                <h2>Total 44m</h2>
                <p id="total-44m">0</p>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed"><path d="M480-528 296-344l-56-56 240-240 240 240-56 56-184-184Z"/></svg>
            </div>
            <div class="hidden-content" id="44m-detail"></div>
        </div>
        <div class="stat-box">
            <div class="stat-box-content">
                <h2>Total Combined</h2>
                <p id="total-combined">0</p>
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed"><path d="M480-528 296-344l-56-56 240-240 240 240-56 56-184-184Z"/></svg>
            </div>
            <div class="hidden-content" id="combined-detail"></div>
        </div>
    </div>

    <div id="search-container">
        <input type="text" id="search" placeholder="Search…  (try #type:movie  #rating:5  #tag:sci-fi)">
        <button id="add-new">+ Add new</button>
        <button id="export-btn" class="secondary">Export</button>
        <button id="import-btn" class="secondary">Import</button>
        <input type="file" id="import-file" accept="application/json" hidden>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Rating</th>
                    <th>Heart</th>
                    <th>Name</th>
                    <th>Season</th>
                    <th>Type</th>
                    <th>Date</th>
                    <th>Saga</th>
                    <th>Tags</th>
                    <th>Rewatched</th>
                    <th>Sequel</th>
                </tr>
            </thead>
            <tbody id="entries"></tbody>
        </table>
    </div>

    <!-- Add / prefill modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" id="modal-close">&times;</span>
            <h2>Add New Entry</h2>
            <form id="add-entry-form" class="entry-form">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="type">Type:</label>
                    <select id="type" name="type" required>
                        <option value="Movie">Movie</option>
                        <option value="Series">Series</option>
                        <option value="44 min">44 min</option>
                    </select>
                </div>
                <div class="form-group" id="season-group" hidden>
                    <label for="season">Season:</label>
                    <input type="text" id="season" name="season" pattern="[0-9\-]+" inputmode="numeric">
                </div>
                <div class="field-row">
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                        <button type="button" id="set-today-date">Today</button>
                    </div>
                    <div class="form-group">
                        <label for="time">Time:</label>
                        <input type="time" id="time" name="time" required>
                        <button type="button" id="set-today-time">Now</button>
                    </div>
                </div>
                <div class="ratings">
                    <div class="form-group">
                        <label>Rating:</label>
                        <div class="star-rating">
                            <input type="radio" id="5-stars" name="rating" value="5" />
                            <label for="5-stars" class="star">&#9733;</label>
                            <input type="radio" id="4-stars" name="rating" value="4" />
                            <label for="4-stars" class="star">&#9733;</label>
                            <input type="radio" id="3-stars" name="rating" value="3" />
                            <label for="3-stars" class="star">&#9733;</label>
                            <input type="radio" id="2-stars" name="rating" value="2" />
                            <label for="2-stars" class="star">&#9733;</label>
                            <input type="radio" id="1-star" name="rating" value="1" />
                            <label for="1-star" class="star">&#9733;</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Heart:</label>
                        <div class="heart-rating">
                            <input type="radio" id="2-heart" name="heart" value="3" />
                            <label for="2-heart" class="heart heart-full">&#10084;</label>
                            <input type="radio" id="1-heart" name="heart" value="2" />
                            <label for="1-heart" class="heart heart-half" dir="rtl">&#10084;</label>
                            <input type="radio" id="0.5-heart" name="heart" value="1" />
                            <label for="0.5-heart" class="heart heart-half">&#10084;</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="saga">Saga:</label>
                    <div class="inline-add">
                        <select id="saga" name="saga">
                            <option value="">Select Saga</option>
                        </select>
                        <button type="button" id="add-saga">+ Add Saga</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tags">Tags:</label>
                    <div class="inline-add">
                        <select id="tags" name="tags">
                            <option value="">Select Tag</option>
                        </select>
                        <button type="button" id="add-tag">+ Add Tag</button>
                    </div>
                    <div id="selected-tags" class="selected-tags"></div>
                </div>
                <div class="form-group">
                    <label for="rewatched">Rewatched:</label>
                    <select id="rewatched" name="rewatched" required>
                        <option value="No" selected>No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="sequel">Sequel:</label>
                    <select id="sequel" name="sequel" required>
                        <option value="No" selected>No</option>
                        <option value="Yes">Yes</option>
                        <option value="Maybe">Maybe</option>
                    </select>
                </div>
                <button type="submit">Add Entry</button>
            </form>
        </div>
    </div>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
